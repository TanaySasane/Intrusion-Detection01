name: Deploy to Production

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.14'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Initialize database
      run: python init_db.py
    
    - name: Test application imports
      run: python -c "from app import app; print('✅ App imports successfully')"
    
    - name: Check for syntax errors
      run: python -m py_compile app.py Database.py init_db.py

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: docker build -t intrusion-detection .
    
    - name: Test Docker image
      run: |
        docker run -d -p 5000:5000 --name test-app intrusion-detection
        sleep 5
        docker ps | grep test-app
        docker stop test-app

  deploy-info:
    runs-on: ubuntu-latest
    needs: [test, build-docker]
    
    steps:
    - name: Deployment Ready
      run: |
        echo "✅ All tests passed!"
        echo "🚀 Ready to deploy to:"
        echo "   - Render: https://render.com"
        echo "   - Railway: https://railway.app"
        echo "   - Heroku: heroku git:remote -a your-app"
        echo ""
        echo "📚 See DEPLOYMENT_COMPLETE.md for instructions"
